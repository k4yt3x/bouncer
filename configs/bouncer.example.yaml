# Bouncer example configuration.
#
# Copy this file to `bouncer.yaml` (or point --config at it), then fill in the
# required secrets and group ids before starting Bouncer.

telegram:
    # Obtain a bot token from @BotFather.
    bot_token: "REPLACE_ME_WITH_TELEGRAM_BOT_TOKEN"

llm:
    # Any OpenAI-compatible endpoint works. Leave as-is for hosted OpenAI.
    base_url: "https://api.openai.com/v1"
    api_key: "REPLACE_ME_WITH_OPENAI_API_KEY"
    model: "gpt-5.3-chat"
    temperature: 0.4
    # max_tokens: 512
    request_timeout_secs: 30
    # How many recently-asked questions per group to feed back to the LLM
    # as a "do not repeat" list. 0 disables the dedup nudge entirely.
    recent_question_window: 20

timeouts:
    # How long after the join request the user has to tap the "Start" button.
    button_press_secs: 120
    # How long the user has to send an answer after the question is delivered.
    answer_submission_secs: 600

cooldown:
    # Time before a user whose verification failed can try again.
    retry_after_secs: 3600

i18n:
    # Built-in locales: "en", "zh-CN". Override per group with `locale:` below.
    default_locale: en

groups:
    # Enroll each group Bouncer should gate. Groups not listed here are ignored,
    # leaving join requests to be handled by human admins. Group ids are negative
    # integers for supergroups; you can find yours by temporarily adding
    # @getidsbot (or similar) to the group.
    # hiking
    - id: -1001234567890
      # Set to false to temporarily silence Bouncer for this group without
      # removing it from the config. Defaults to true.
      enabled: true
      # locale: zh-CN
      question_prompt: |
          Generate ONE short question about hiking, trail safety, or outdoor
          navigation. The question should be answerable in one or two sentences by
          any real hiker, without requiring lookup. Output only the question.

    # amateur radio
    # - id: -1009876543210
    #   enabled: true
    #   question_prompt: |
    #     Generate ONE short question covering amateur radio operation,
    #     regulations (FCC Part 97 in the US), or basic RF theory. Output only
    #     the question.
